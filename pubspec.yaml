name: compre_facil
description: "Aplicativo móvel para otimização de compras em supermercados."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  material_symbols_icons: ^4.0.0
  provider: ^6.0.0
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: 6.6.0
  # keep Google Sign-In 6.x for current code compatibility
  google_sign_in: ^6.3.0
  cloud_functions: ^4.0.0
  shared_preferences: ^2.2.0
  hive: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
